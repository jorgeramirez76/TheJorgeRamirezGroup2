  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --dark: #0f1117;
      --dark-2: #1a1f2e;
      --mid: #2d3347;
      --light: #f5f3ee;
      --white: #ffffff;
      --text: #2c2c2c;
      --text-light: #666;
      --accent: #1a4b8c;
      --green: #22c55e;
      --border: #e2ddd6;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--white);
      color: var(--text);
      line-height: 1.7;
    }
    
    /* ── TOP NAV ── */
    .topnav {
      background: var(--dark);
      padding: 14px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 2px solid var(--gold);
    }
    .topnav-logo { color: var(--white); font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700; text-decoration: none; }
    .topnav-logo span { color: var(--gold); }
    .topnav-links { display: flex; gap: 28px; align-items: center; }
    .topnav-links a { color: #ccc; text-decoration: none; font-size: 0.88rem; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; transition: color 0.2s; }
    .topnav-links a:hover { color: var(--gold); }
    .topnav-cta { background: var(--gold); color: var(--dark) !important; padding: 8px 18px; border-radius: 4px; font-weight: 600 !important; }
    
    /* ── BREADCRUMB ── */
    .breadcrumb {
      background: var(--light);
      padding: 10px 40px;
      font-size: 0.82rem;
      color: var(--text-light);
      border-bottom: 1px solid var(--border);
    }
    .breadcrumb a { color: var(--accent); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb span { margin: 0 6px; color: #aaa; }
    
    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 50%, #1a2a4a 100%);
      padding: 70px 40px 60px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 40%;
      background: linear-gradient(135deg, transparent, rgba(201,168,76,0.08));
      pointer-events: none;
    }
    .hero-inner { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
